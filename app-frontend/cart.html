<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Peach Cream</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Breadcrumb -->
    <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="sep"><i class="fa-solid fa-chevron-right"></i></span>
        <span class="current">Peach Cream</span>
    </div>

    <!-- Cart Section -->
    <section class="cart-section">
        <h1 class="cart-title">Your Shopping Cart</h1>

        <div class="cart-container">
            <!-- Cart Table Headers -->
            <div class="cart-header">
                <div class="header-product">PRODUCT</div>
                <div class="header-qty">QUANTITY</div>
                <div class="header-total">TOTAL</div>
            </div>

            <!-- Cart Items -->
            <div class="cart-items">
                <!-- Item 1 -->
                <div class="cart-item">
                    <div class="item-product">
                        <div class="item-img">
                            <img src="images/what-make-you-happy.png" alt="Peach Cream">
                        </div>
                        <div class="item-details">
                            <h3>Peach Cream</h3>
                            <p class="item-price">$50.00</p>
                            <p class="item-meta">Pack Size: 1 Bottle</p>
                        </div>
                    </div>
                    <div class="item-qty">
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateCartQty(-1)">-</button>
                            <input type="number" class="qty-input" value="1" min="1">
                            <button class="qty-btn" onclick="updateCartQty(1)">+</button>
                        </div>
                        <button class="remove-btn"><i class="fa-regular fa-trash-can"></i></button>
                    </div>
                    <div class="item-total">$50.00</div>
                </div>

                <!-- Item 2 -->
                <div class="cart-item">
                    <div class="item-product">
                        <div class="item-img">
                            <img src="images/what-make-you-happy.png" alt="Peach Cream">
                        </div>
                        <div class="item-details">
                            <h3>Peach Cream</h3>
                            <p class="item-price">$50.00</p>
                            <p class="item-meta">Pack Size: 1 Bottle</p>
                        </div>
                    </div>
                    <div class="item-qty">
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateCartQty(-1)">-</button>
                            <input type="number" class="qty-input" value="1" min="1">
                            <button class="qty-btn" onclick="updateCartQty(1)">+</button>
                        </div>
                        <button class="remove-btn"><i class="fa-regular fa-trash-can"></i></button>
                    </div>
                    <div class="item-total">$50.00</div>
                </div>
            </div>

            <!-- Cart Actions -->
            <div class="cart-actions">
                <a href="Product-page.html" class="action-btn outline">Return to product</a>
                <a href="empty-cart.html" class="action-btn outline">Clear Shopping Cart</a>
            </div>

            <div class="cart-summary">
                <div class="summary-card">
                    <div class="summary-row">
                        <span class="summary-label">Subtotal:</span>
                        <span class="summary-value">$100.00</span>
                    </div>
                    <p class="summary-note">Taxes and shipping calculated at checkout.</p>
                    <a href="shipping.html" class="checkout-btn"
                        style="text-decoration:none; display:inline-block; text-align:center;">Check out</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="index.js"></script>
    <script>
        function updateCartQty(delta) {
            // Placeholder function for UI interaction
        }
    </script>
</body>

</html>
